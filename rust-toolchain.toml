[toolchain]
# 1.88 is the floor required to pull `time 0.3.47+` (the fix for
# RUSTSEC-2026-0009 "DoS via stack exhaustion" — cookie 0.18 pulls `time`
# transitively and the patched release requires this toolchain). Bumping
# in lockstep with `Cargo.toml` workspace.package.rust-version.
channel = "1.88"
components = ["rustfmt", "clippy"]
