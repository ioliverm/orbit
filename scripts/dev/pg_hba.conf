# Orbit local Postgres — pg_hba.conf (Slice 0a per ADR-015, S0-16 local flavor).
#
# Contract: every TCP/IP connection MUST use TLS. There is NO `host` entry
# without TLS anywhere in this file. Verifying `sslmode=disable` is refused is
# part of the acceptance check for this slice.
#
# Local Unix socket is `trust` — it is only reachable from inside the
# container and is used by the healthcheck (`pg_isready`) and by the first-
# boot init scripts. External callers cannot reach the socket.
#
# Authentication method for TCP: scram-sha-256. MD5 is not accepted anywhere.
#
# TYPE      DATABASE  USER      ADDRESS       METHOD      OPTIONS

# --- Local Unix socket (not exposed outside the container) ---
local       all       all                     trust

# --- TCP: TLS is mandatory ---
# IPv4 loopback + docker bridge network. clientcert is not required here —
# the local dev stack uses password auth over TLS. 0b adds mutual TLS if/when
# we deploy external replicas.
hostssl     all       all       127.0.0.1/32  scram-sha-256
hostssl     all       all       0.0.0.0/0     scram-sha-256

# IPv6 loopback + any (docker IPv6 where enabled).
hostssl     all       all       ::1/128       scram-sha-256
hostssl     all       all       ::/0          scram-sha-256

# --- Explicit: no `host` (non-TLS) entries exist. Any TCP connection that
#     does not negotiate TLS is rejected by the server.
