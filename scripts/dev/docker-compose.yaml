# Orbit local Postgres stack — Slice 0a (ADR-015, S0-16 local flavor).
#
# Purpose: deliver the 0a flavor of S0-16 — Postgres with TLS-required `pg_hba`
# and three non-superuser, non-BYPASSRLS roles (`orbit_migrate`, `orbit_app`,
# `orbit_support`). Private-network binding and systemd LoadCredential= land at
# 0b; here the container is bound to 127.0.0.1 only and secrets come from a
# git-ignored `.env` at mode 0600 (S0-19 local flavor).
#
# Usage:
#   cp .env.example .env && chmod 600 .env    # fill in passwords
#   just db-up                                # docker compose up -d
#   just db-down                              # docker compose down
#   just db-reset                             # wipes the named volume; TLS cert regenerates
#
# Do NOT expose the 5432 port publicly. Do NOT commit `.env`. Do NOT bake
# secrets into this file or into init scripts.

name: orbit-dev

services:
  # One-shot sidecar: generates the self-signed TLS cert into the
  # orbit-postgres-certs named volume before the postgres service starts.
  # Rationale: the postgres image's initdb phase starts a temporary server
  # with the command-line `ssl=on` args, which tries to load server.crt
  # BEFORE /docker-entrypoint-initdb.d/*.sh runs. Generating the cert in a
  # prerequisite service (via depends_on: service_completed_successfully)
  # guarantees it exists by the time postgres boots at all.
  tls-init:
    image: postgres:16.8-bookworm
    container_name: orbit-postgres-tls-init
    entrypoint: ["/usr/local/bin/gen-tls-cert.sh"]
    environment:
      TLS_DIR: /certs
    volumes:
      - orbit-postgres-certs:/certs
      - ./gen-tls-cert.sh:/usr/local/bin/gen-tls-cert.sh:ro
    restart: "no"

  postgres:
    # Postgres 16. TODO(0b): pin by @sha256:<digest> once we mirror the image
    # used by the deploy pipeline (ADR-013 §Dependency hygiene). The tag pin is
    # acceptable for a local-only 0a stack per ADR-015 scope.
    image: postgres:16.8-bookworm
    container_name: orbit-postgres-dev
    restart: unless-stopped
    depends_on:
      tls-init:
        condition: service_completed_successfully

    # Bind to loopback only — no 0.0.0.0 exposure. Private-network binding is
    # a 0b concern; loopback is the 0a stand-in.
    ports:
      - "127.0.0.1:5432:5432"

    environment:
      # Superuser, used only by the image's initdb bootstrap and by the init
      # scripts in /docker-entrypoint-initdb.d. Application code MUST connect
      # as `orbit_app` (runtime) or `orbit_migrate` (migrations) — never as
      # this superuser.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}
      POSTGRES_USER: postgres
      POSTGRES_DB: orbit

      # Role passwords consumed by pg_init/00-render-roles.sh via envsubst.
      # Not injected into the server environment of running queries; they are
      # only read by the one-shot init script on first boot.
      POSTGRES_ORBIT_MIGRATE_PASSWORD: ${POSTGRES_ORBIT_MIGRATE_PASSWORD:?required}
      POSTGRES_ORBIT_APP_PASSWORD: ${POSTGRES_ORBIT_APP_PASSWORD:?required}
      POSTGRES_ORBIT_SUPPORT_PASSWORD: ${POSTGRES_ORBIT_SUPPORT_PASSWORD:?required}

      # Locale: keep the cluster in UTF-8; the app assumes it.
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"

    # TLS-required pg_hba.conf + ssl=on passed via command args. The cert
    # and key live in the orbit-postgres-certs named volume, pre-populated
    # by the tls-init service (see depends_on above). hba_file is mounted
    # read-only from the host.
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/etc/postgresql/certs/server.crt"
      - "-c"
      - "ssl_key_file=/etc/postgresql/certs/server.key"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
      - "-c"
      - "password_encryption=scram-sha-256"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_hostname=off"

    volumes:
      - orbit-postgres-data:/var/lib/postgresql/data
      # Cert volume prepared by tls-init — mounted read-only.
      - orbit-postgres-certs:/etc/postgresql/certs:ro
      # Init scripts run on first boot only (when PGDATA is empty). Numeric
      # prefixes determine execution order. Shell scripts run as the postgres
      # user.
      #
      # We mount the `.sh` script individually (not the whole pg_init/
      # directory). Rationale: 01-roles.sql contains `${VAR}` placeholders
      # rendered by 00-render-roles.sh; if the postgres image saw it as a
      # `.sql` file in /docker-entrypoint-initdb.d/, it would psql it
      # directly and create roles with LITERAL `${...}` passwords. Mounting
      # 01-roles.sql under a non-initdb path avoids that.
      - ./pg_init/00-render-roles.sh:/docker-entrypoint-initdb.d/00-render-roles.sh:ro
      - ./pg_init/01-roles.sql:/opt/orbit/init/01-roles.sql:ro
      # TLS-required pg_hba — mounted read-only; not in PGDATA so it survives
      # volume resets consistently.
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro

    # pg_isready against the TCP port (the TLS-enforced surface). pg_isready
    # does not perform a TLS handshake itself — it probes acceptance of a
    # connection on the TCP port — so the check passes as soon as the server
    # is up AND bound to TCP (which implies ssl=on has loaded). Rationale:
    # the health signal we want is "cluster is listening on the TLS-required
    # TCP port"; the TLS handshake is separately verified during 3.1/3.2 of
    # the dev-setup runbook.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orbit -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

    # Minimal hardening for the dev container. Production hardening (user
    # namespaces, read-only rootfs, cap_drop) lives in 0b.
    security_opt:
      - no-new-privileges:true

volumes:
  orbit-postgres-data:
    name: orbit-postgres-data
  orbit-postgres-certs:
    name: orbit-postgres-certs
