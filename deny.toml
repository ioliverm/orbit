# cargo-deny configuration — Slice 0a, schema version 2.
#
# Backs security-checklist item S0-02 (advisories, bans, licenses, sources).
# Invoked from .github/workflows/ci.yaml's `backend-audit` job.
# See also ADR-013 §Dependency hygiene.
#
# Policy summary:
#   - Advisories: deny known vulnerabilities by default (built-in behaviour
#     of the v2 schema); ignore-list carries one entry with rationale.
#   - Licenses:   explicit allowlist; GPL/AGPL/LGPL families are denied.
#   - Sources:    only crates.io. No git sources in Slice 0a.
#   - Bans:       warn on duplicate versions; no skip-list by default.
#
# The v2 schema (cargo-deny ≥ 0.15) replaces the per-category severity knobs
# (`vulnerability`, `unmaintained`, `yanked`, `notice`) with defaults plus a
# per-advisory-ID `ignore` mechanism. Toggle via `version = 2` under each
# section that supports it. This file is tightened in Slice 0b (e.g.
# `multiple-versions = "deny"` + a curated skip list).

# ---------------------------------------------------------------------------
# Advisories
# ---------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Every entry must carry a reason + review date. When an ignore lands, open
# a tracking issue so the entry has an owner and a natural expiry when the
# upstream fix ships. Keep in sync with `.cargo/audit.toml`.
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack: potential key recovery through
    # timing sidechannels" in the `rsa` crate. Pulled transitively by
    # `sqlx-postgres` for password auth over the wire.
    #
    # Why ignored (2026-04-20): there is NO fixed upstream release. Orbit's
    # exposure is narrow — server-initiated TLS from the API to an internal
    # Postgres (loopback in 0a; private LAN in Slice 8). The session-password
    # path does NOT traverse `rsa`; Orbit uses argon2id + CSPRNG session
    # tokens (orbit-auth crate). Re-evaluate each time `sqlx` bumps `rsa`
    # or at Slice-8 cutover.
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin Attack — no upstream fix; sqlx-postgres transitive; Orbit does not use rsa for session crypto." },
]

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------
[licenses]
version = 2
# SPDX identifiers. Intersection of:
#   - permissive licenses Orbit can redistribute freely,
#   - MPL-2.0 (file-scope copyleft; compatible with our single-binary
#     distribution per ADR-013 §Dependency hygiene),
#   - CC0-1.0 + Unicode-DFS-2016 (data / identifier tables pulled in by
#     common crates such as `unicode-ident`).
#
# Copyleft families GPL-*, AGPL-*, LGPL-* are not on this list and are
# therefore effectively denied. If a crate pulls an LGPL dep, the resolution
# path is a permissive alternative; only if no alternative exists does
# security-engineer review and approve a case-by-case `exceptions` entry.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    # CDLA-Permissive-2.0 is the Community Data License Agreement (permissive
    # data license). Pulled in by `webpki-roots` for the Mozilla CA store.
    # Documented as permissive-only, compatible with single-binary
    # distribution; reviewed 2026-04-20.
    "CDLA-Permissive-2.0",
]

# Confidence threshold for the license detector. 0.8 is cargo-deny's default;
# bump to 0.93 in 0b once the full dep graph is frozen.
confidence-threshold = 0.8

# Per-crate license overrides. Empty at 0a — any entry here requires a
# comment naming the reviewer and the upstream discussion.
exceptions = []

# Orbit's own workspace crates declare `license = "UNLICENSED"` (the project
# is not open-source). `publish = false` is set on every workspace member;
# telling cargo-deny to skip license checks on private (unpublishable) crates
# avoids the false-positive `unlicensed` failure on Orbit crates while still
# enforcing the allowlist against real third-party deps.
private = { ignore = true }

# ---------------------------------------------------------------------------
# Bans
# ---------------------------------------------------------------------------
[bans]
# Multiple versions of the same crate waste build time and enlarge the SBOM
# surface. Warn in 0a so we notice; tightened to deny in 0b with a curated
# `skip` list once the dep graph is stable.
multiple-versions = "warn"

# Wildcard version requirements (e.g. `version = "*"`) are banned outright
# for third-party deps. Backs S0-04 (no `*`/`latest` ranges in manifests).
wildcards = "deny"
# Workspace-internal path deps (`{ path = "..." }` without a `version`) are
# wildcard-shaped by definition; that's how `cargo` ingests them. Allow those
# explicitly so S0-04 only bites real `version = "*"` declarations on external
# crates.
allow-wildcard-paths = true

# Highlight the full dependency path in warnings so fix-ups are obvious.
highlight = "all"

# Crates explicitly allowed (usually empty; we use the license + advisory
# gates instead of name-level allowlists).
allow = []

# Crates explicitly denied by name. Empty at 0a. If a crate here is ever
# added, it needs a comment with the owner, the alternative, and the date.
deny = []

# `skip` is the list of (name, version) pairs tolerated under
# multiple-versions = "deny". We intentionally ship 0a with an empty list,
# per the product-owner instruction: accept the noise now, populate once
# the dep graph stabilizes and 0b flips `multiple-versions` to deny.
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
[sources]
# Unknown registries are forbidden. If this triggers, the fix is usually a
# misconfigured CI environment (a private registry URL leaked in), not a
# real dep choice.
unknown-registry = "deny"

# Git sources are forbidden in Slice 0a. If one is ever needed (e.g. a
# pre-release patch), add its URL to `allow-git` in the same PR that pulls
# the dep, with a comment naming the upstream release timeline.
unknown-git = "deny"

# Only crates.io. No mirrors, no vendored forks in 0a.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
